<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Claude Code Remote</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <h1>Claude Code Remote</h1>
    <button id="logout">Logout</button>
  </header>

  <main>
    <section class="panel" id="clients-panel">
      <h2>Clients</h2>
      <ul id="clients"></ul>
    </section>

    <section class="panel" id="sessions-panel">
      <h2>Remote sessions <small id="selected-name"></small></h2>
      <ul id="sessions"></ul>

      <div class="actions">
        <form id="new-form">
          <h3>Start new</h3>
          <input name="workingDirectory" placeholder="/home/node/workspace/repos/foo" required>
          <button>New session</button>
        </form>
        <form id="bind-form">
          <h3>Bind existing</h3>
          <input name="sessionId" placeholder="session id" required>
          <input name="workingDirectory" placeholder="working directory" required>
          <button>Bind</button>
        </form>
      </div>

      <pre id="result">—</pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
