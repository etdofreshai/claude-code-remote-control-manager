<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Claude Code Remote</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <h1>Claude Code Remote</h1>
    <button id="logout" class="btn-inline">Logout</button>
  </header>

  <main>
    <section class="panel" id="clients-panel">
      <h2>Clients</h2>
      <ul id="clients"></ul>
    </section>

    <section class="panel" id="sessions-panel">
      <h2>Remote sessions <small id="selected-name"></small></h2>

      <div class="toolbar">
        <button id="show-new" class="btn-secondary">+ Start new</button>
        <button id="show-bind" class="btn-secondary">+ Bind existing</button>
      </div>

      <form id="new-form" class="hidden">
        <h3>Start new session</h3>
        <input name="name" placeholder="name (optional)">
        <input name="workingDirectory" placeholder="/home/node/workspace/repos/foo" required>
        <div class="row">
          <select name="provider" data-role="provider"></select>
          <select name="model" data-role="model"></select>
          <select name="effort" data-role="effort"></select>
        </div>
        <div class="row">
          <button>Create</button>
          <button type="button" data-cancel class="btn-secondary">Cancel</button>
        </div>
      </form>

      <form id="bind-form" class="hidden">
        <h3>Bind existing session</h3>
        <input name="workingDirectory" placeholder="working directory" required>
        <div class="row">
          <select name="provider" data-role="provider"></select>
          <select name="model" data-role="model"></select>
          <select name="effort" data-role="effort"></select>
        </div>
        <div class="input-with-action">
          <input name="sessionId" placeholder="session id" required>
          <button type="button" id="browse-sessions" class="btn-secondary btn-inline">Browse…</button>
        </div>
        <div id="session-browser" class="session-browser hidden">
          <div class="session-browser-header">
            <span id="session-browser-title">Loading…</span>
            <button type="button" id="browse-close" class="btn-secondary btn-inline">×</button>
          </div>
          <input type="text" id="browse-search" placeholder="Search title or last message…" autocomplete="off">
          <ul id="session-browser-list"></ul>
          <div class="session-browser-footer">
            <button type="button" id="browse-prev" class="btn-secondary btn-inline">◀ Prev</button>
            <span id="browse-page-label"></span>
            <button type="button" id="browse-next" class="btn-secondary btn-inline">Next ▶</button>
          </div>
        </div>
        <div class="row">
          <button>Bind</button>
          <button type="button" data-cancel class="btn-secondary">Cancel</button>
        </div>
      </form>

      <div class="session-controls">
        <label>Sort
          <select id="sort-primary">
            <option value="lastMessage">Last message</option>
            <option value="name">Name (a–z)</option>
            <option value="enabled">Enabled first</option>
            <option value="model">Model</option>
            <option value="provider">Provider</option>
          </select>
        </label>
        <label>Then
          <select id="sort-secondary">
            <option value="">—</option>
            <option value="lastMessage">Last message</option>
            <option value="name">Name (a–z)</option>
            <option value="enabled">Enabled first</option>
            <option value="model">Model</option>
            <option value="provider">Provider</option>
          </select>
        </label>
        <label>Group by
          <select id="group-by">
            <option value="">—</option>
            <option value="model">Model</option>
            <option value="provider">Provider</option>
            <option value="enabled">Enabled / Disabled</option>
          </select>
        </label>
      </div>

      <ul id="sessions"></ul>

      <!-- Send-message modal -->
      <div id="send-modal" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-card">
          <h3>Send message</h3>
          <p id="send-target" class="modal-current"></p>
          <form id="send-form">
            <label>Text
              <textarea name="text" rows="6" placeholder="Steer the session…" required></textarea>
            </label>
            <details>
              <summary>Attach image (optional)</summary>
              <input type="file" name="image" accept="image/*">
              <p class="modal-current">PNG/JPEG/WebP. Sent as a base64 image block alongside the text.</p>
            </details>
            <div class="row">
              <button>Send</button>
              <button type="button" id="send-cancel" class="btn-secondary">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Switch modal -->
      <div id="switch-modal" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-card">
          <h3>Switch session</h3>
          <p id="switch-current" class="modal-current"></p>
          <form id="switch-form">
            <label>Provider
              <select name="provider"></select>
            </label>
            <label>Model
              <select name="model"></select>
            </label>
            <label>Effort
              <select name="effort"></select>
            </label>
            <div class="row">
              <button>Switch</button>
              <button type="button" id="switch-cancel" class="btn-secondary">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <pre id="result" class="hidden">—</pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
