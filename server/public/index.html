<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Harness · AI session orchestrator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #0a0a0c;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    overflow: hidden;
  }
  #root { width: 100%; height: 100%; }
  @keyframes hrnPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.7); opacity: 0; }
  }
  @keyframes hrnBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
  /* Show per-message copy button on hover of its row */
  .hrn-msg-row:hover .hrn-copy-btn { opacity: 0.85 !important; }
  .hrn-msg-row .hrn-copy-btn:hover { opacity: 1 !important; }
  /* Show group grip on header hover */
  [draggable]:hover .hrn-group-grip { opacity: 0.7 !important; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React 18 + Babel (pinned, with integrity) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Plain JS data + theme -->
<script src="/static/harness-theme.js"></script>
<script src="/static/harness-data.js"></script>

<!-- Babel components (order matters) -->
<script type="text/babel" src="/static/tweaks-panel.jsx"></script>
<script type="text/babel" src="/static/harness-icons.jsx"></script>
<script type="text/babel" src="/static/harness-providers.jsx"></script>
<script type="text/babel" src="/static/harness-sidebar.jsx"></script>
<script type="text/babel" src="/static/harness-chat.jsx"></script>
<script type="text/babel" src="/static/harness-input.jsx"></script>
<script type="text/babel" src="/static/harness-launcher.jsx"></script>
<script type="text/babel" src="/static/harness-settings.jsx"></script>
<script type="text/babel" src="/static/harness.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "Eclipse",
  "dark": false,
  "density": "compact",
  "sidebar": true,
  "bubble": false
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <Harness tweaks={t} setTweak={setTweak} data={window.HARNESS_DATA} />

      <TweaksPanel>
        <TweakSection label="Appearance" />
        <TweakRadio
          label="Variant"
          value={t.variant}
          options={['Eclipse', 'Ember', 'Console']}
          onChange={(v) => setTweak('variant', v)}
        />
        <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak('dark', v)} />
        <TweakRadio
          label="Density"
          value={t.density}
          options={['compact', 'comfy']}
          onChange={(v) => setTweak('density', v)}
        />
        <TweakSection label="Layout" />
        <TweakToggle label="Show sidebar" value={t.sidebar} onChange={(v) => setTweak('sidebar', v)} />
        <TweakRadio
          label="Messages"
          value={t.bubble ? 'bubble' : 'flat'}
          options={['flat', 'bubble']}
          onChange={(v) => setTweak('bubble', v === 'bubble')}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
